[pytest]
markers =
    unit: Unit tests (no external dependencies, fast).
    integration: Integration tests that exercise real components/pipeline.
    e2e: End-to-end tests requiring real data sources.
    slow: Tests that take more than a few seconds (e.g., full backtest run).
testpaths = tests src/backtest/tests
pythonpath = .
# --cov 在 Phase 1 全量测试时启用，默认不携带以避免覆盖全量旧代码统计偏差。
# 完整 coverage ≥95% 验证:  pytest --cov=src/backtest --cov-report=term-missing --cov-fail-under=95
addopts = --tb=short --strict-markers
