name: Daily Full Regression
on:
  schedule:
    - cron: '0 21 * * *'  # 北京时间 05:00（UTC 21:00）
  workflow_dispatch:       # 手动触发

jobs:
  full-regression:
    runs-on: [self-hosted, windows, fzm-zenbook]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: python -m pip install -e .
      - name: Collect-Only
        run: .\run_verify_ci.ps1 -CollectOnly
        shell: powershell
      - name: Full Regression (core + moheng)
        run: .\run_verify_ci.ps1 -SkipVerify -XmlReport
        shell: powershell
      - name: Full Regression (verify suites)
        run: .\run_verify_ci.ps1 -SkipCore -SkipMoheng -XmlReport
        shell: powershell
      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: tests/_junit_*.xml

      - name: Notify Feishu on Failure
        if: failure()
        continue-on-error: true
        shell: powershell
        env:
          FEISHU_CI_WEBHOOK: ${{ secrets.FEISHU_CI_WEBHOOK }}
        run: |
          .\scripts\feishu_ci_notify.ps1 `
            -WebhookUrl "$env:FEISHU_CI_WEBHOOK" `
            -WorkflowName "${{ github.workflow }}" `
            -TriggerEvent "${{ github.event_name }}" `
            -Branch "${{ github.ref_name }}" `
            -CommitSha "${{ github.sha }}" `
            -CommitUrl "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}" `
            -RunId "${{ github.run_id }}" `
            -RunUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" `
            -FailedStep "See run logs" `
            -Actor "${{ github.actor }}" `
            -Repo "${{ github.repository }}"
