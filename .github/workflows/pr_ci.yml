name: PR CI
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  verify:
    runs-on: [self-hosted, windows, fzm-zenbook]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Check Python
        shell: cmd
        run: python --version && pip --version
      - name: Install Dependencies
        shell: cmd
        env:
          HTTP_PROXY: http://127.0.0.1:10809
          HTTPS_PROXY: http://127.0.0.1:10809
        run: python -m pip install --no-build-isolation -e .
      - name: Verify Import
        shell: cmd
        run: python -c "from signals import *; print('Import OK')"
      - name: Collect-Only Dry Run
        shell: cmd
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\run_verify_ci.ps1 -CollectOnly

      - name: Notify Feishu on Failure
        if: failure()
        continue-on-error: true
        shell: powershell
        env:
          FEISHU_CI_WEBHOOK: ${{ secrets.FEISHU_CI_WEBHOOK }}
        run: |
          .\scripts\feishu_ci_notify.ps1 `
            -WebhookUrl "$env:FEISHU_CI_WEBHOOK" `
            -WorkflowName "${{ github.workflow }}" `
            -TriggerEvent "${{ github.event_name }}" `
            -Branch "${{ github.ref_name }}" `
            -CommitSha "${{ github.sha }}" `
            -CommitUrl "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}" `
            -RunId "${{ github.run_id }}" `
            -RunUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" `
            -FailedStep "See run logs" `
            -Actor "${{ github.actor }}" `
            -Repo "${{ github.repository }}"
